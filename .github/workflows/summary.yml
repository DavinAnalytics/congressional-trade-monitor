name: Congressional Trade Monitor — Weekly Summary

on:
  schedule:
    # Runs Sunday at 9:00 PM PST (Monday 05:00 UTC)
    - cron: "0 5 * * 1"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly summary
        env:
          ALERT_EMAIL_SENDER:     ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:   ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          GIST_ID:                ${{ secrets.GIST_ID }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
        run: python monitor.py --summary
