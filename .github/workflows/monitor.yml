name: Congressional Trade Monitor

on:
  schedule:
    # Runs once daily at 8:00 AM EST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ALERT_EMAIL_SENDER:     ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:   ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          GIST_ID:                ${{ secrets.GIST_ID }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
        run: python monitor.py --once