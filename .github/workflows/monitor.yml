name: Congressional Trade Monitor

on:
  schedule:
    # Runs daily at 6:00 AM PST (14:00 UTC)
    - cron: "0 14 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (summary on Sundays, alerts other days)
        env:
          ALERT_EMAIL_SENDER:     ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:   ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          GIST_ID:                ${{ secrets.GIST_ID }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ]; then
            echo "Monday UTC (Sunday PST) — running weekly summary"
            python monitor.py --summary
          else
            echo "Weekday — running alert monitor"
            python monitor.py --once
          fi