name: Congressional Trade Monitor

on:
  schedule:
    # Runs daily at 5:55 AM PST / 6:55 AM PDT (13:55 UTC)
    # Using an odd minute (:55) to beat the top-of-the-hour GitHub traffic jam
    - cron: "55 13 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (summary on Sundays, alerts other days)
        env:
          ALERT_EMAIL_SENDER:     ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:   ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          GIST_ID:                ${{ secrets.GIST_ID }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
        run: |
          DAY_PST=$(TZ="America/Los_Angeles" date +%u) 
          if [ "$DAY_PST" = "7" ]; then 
            echo "It is Sunday in California — running weekly summary" 
            python monitor.py --summary 
          else 
            echo "It is Mon-Sat in California — running alert monitor" 
            python monitor.py --once 
          fi